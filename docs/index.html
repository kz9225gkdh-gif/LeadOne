<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>LeadOne Support</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f4f7fb;
      --surface: #ffffff;
      --text: #172132;
      --muted: #5c687f;
      --line: #d8dfeb;
      --accent: #2f6df6;
      --shadow: 0 18px 40px rgba(34, 52, 84, 0.08);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: linear-gradient(180deg, #eaf1ff 0%, var(--bg) 220px);
      color: var(--text);
    }

    main {
      width: min(780px, calc(100% - 32px));
      margin: 0 auto;
      padding: 40px 0 72px;
    }

    section {
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: var(--shadow);
      padding: 28px 24px;
    }

    h1 {
      margin: 0 0 12px;
      font-size: 34px;
      line-height: 1.2;
    }

    p {
      margin: 0 0 12px;
      line-height: 1.65;
    }

    .meta {
      color: var(--muted);
    }

    .links {
      display: grid;
      gap: 12px;
      margin-top: 20px;
    }

    a.card {
      display: block;
      padding: 18px;
      border: 1px solid var(--line);
      border-radius: 8px;
      text-decoration: none;
      color: inherit;
      background: #f8fbff;
    }

    a.card strong {
      display: block;
      margin-bottom: 6px;
      color: var(--accent);
      font-size: 17px;
    }

    code {
      padding: 1px 6px;
      border-radius: 6px;
      background: #eef2f8;
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      font-size: 0.95em;
    }

    @media (max-width: 640px) {
      main {
        width: min(100%, calc(100% - 20px));
        padding-top: 20px;
      }

      h1 {
        font-size: 28px;
      }

      section {
        padding: 22px 18px;
      }
    }
  </style>
</head>
<body>
  <main>
    <section>
      <h1>LeadOne 지원 페이지</h1>
      <p>
        LeadOne은 Apple 건강 앱의 Apple Watch ECG 데이터를 불러와 ECG 파형과
        관련 정보를 확인할 수 있도록 돕는 iOS 앱입니다.
      </p>
      <p class="meta">대한민국 출시 준비용 공개 페이지</p>

      <div class="links">
        <a class="card" href="./privacy/">
          <strong>개인정보 처리방침</strong>
          App Store Connect의 Privacy Policy URL로 사용할 공개 페이지입니다.
        </a>
      </div>

      <p style="margin-top: 20px;">
        문의 이메일: <code>wnsgur9359@naver.com</code>
      </p>
    </section>
  </main>
</body>
</html>
